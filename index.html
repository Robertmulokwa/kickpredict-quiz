    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KickPredict — What type of sneakerhead are you?</title>
    <meta name="description" content="Answer one question and find out how KickPredict fits your game.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
        }

        .container {
            max-width: 560px;
            width: 100%;
        }

        /* Logo */
        .logo {
            font-size: 0.85em;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 40px;
        }

        /* Step transitions */
        .step {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .step.hidden {
            display: none;
        }

        .step.fade-out {
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
        }

        .step.fade-in {
            animation: fadeUp 0.35s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Step 1 */
        h1 {
            font-size: 2em;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .option-btn {
            width: 100%;
            padding: 16px 18px;
            background: #000;
            color: #fff;
            border: 1.5px solid #fff;
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            line-height: 1.4;
        }

        .option-btn:hover {
            background: #111;
        }

        .option-btn.selected {
            background: #FF0000;
            border-color: #FF0000;
            color: #fff;
        }

        .go-btn {
            display: none;
            width: 100%;
            padding: 18px;
            background: #FF0000;
            color: #fff;
            border: none;
            font-family: inherit;
            font-size: 1.05em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.15s;
        }

        .go-btn:hover {
            background: #cc0000;
        }

        .go-btn.visible {
            display: block;
        }

        /* Step 2 */
        .response-text {
            font-size: 2.2em;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .play-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: #FF0000;
            color: #fff;
            text-decoration: none;
            font-family: inherit;
            font-size: 1.1em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
            transition: background 0.15s;
            margin-bottom: 16px;
        }

        .play-btn:hover {
            background: #cc0000;
        }

        .trust-line {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.03em;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.65em;
            }

            .response-text {
                font-size: 1.75em;
            }

            .option-btn {
                font-size: 0.9em;
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KickPredict</div>

    <!-- STEP 1 -->
    <div class="step" id="step1">
        <h1>What type of sneakerhead are you?</h1>

        <div class="options">
            <button class="option-btn" data-value="option_a" data-response="That's exactly what KickPredict is for.">
                I want to make money off kicks without the headache of reselling
            </button>
            <button class="option-btn" data-value="option_b" data-response="No more bricks. Start calling shots.">
                I tried flipping but lost on bricks
            </button>
            <button class="option-btn" data-value="option_c" data-response="Stop taking L's. Start winning.">
                I'm tired of taking L's on SNKRS
            </button>
            <button class="option-btn" data-value="option_d" data-response="This is where you start.">
                I don't know where to start
            </button>
            <button class="option-btn" data-value="option_e" data-response="You can do both.">
                I cop for the culture but wouldn't mind making money too
            </button>
            <button class="option-btn" data-value="option_f" data-response="You don't need either.">
                I don't have the cash or connections
            </button>
        </div>

        <button class="go-btn" id="go-btn">Let's Go →</button>
    </div>

    <!-- STEP 2 -->
    <div class="step hidden" id="step2">
        <p class="response-text" id="response-text"></p>
        <a
            class="play-btn"
            href="https://app.kickpredict.co"
            target="_blank"
            rel="noopener"
            onclick="pintrk('track', 'lead'); gtag('event', 'click', {'event_category': 'CTA', 'event_label': 'KickPredict Quiz'});"
        >Play KickPredict →</a>
        <p class="trust-line">Free to play &nbsp;•&nbsp; No inventory &nbsp;•&nbsp; No shipping</p>
    </div>
</div>

<script>
    const options = document.querySelectorAll('.option-btn');
    const goBtn = document.getElementById('go-btn');
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const responseText = document.getElementById('response-text');

    let selectedOption = null;
    let selectedResponse = null;

    options.forEach(function(btn) {
        btn.addEventListener('click', function() {
            // Deselect all
            options.forEach(function(b) { b.classList.remove('selected'); });
            // Select this one
            btn.classList.add('selected');
            selectedOption = btn.dataset.value;
            selectedResponse = btn.dataset.response;
            // Show go button
            goBtn.classList.add('visible');
            // Fire GA selection event
            gtag('event', 'quiz_selection', {'option': selectedOption});
        });
    });

    goBtn.addEventListener('click', function() {
        if (!selectedOption) return;

        responseText.textContent = selectedResponse;

        step1.classList.add('fade-out');
        setTimeout(function() {
            step1.classList.add('hidden');
            step1.classList.remove('fade-out');
            step2.classList.remove('hidden');
            step2.classList.add('fade-in');
        }, 300);
    });
</script>

</body>
</html>
